server:
  port: 8080

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/oms-realm
  cloud:
    gateway:
      routes:
        - id: product-service
          uri: http://${PRODUCT_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/products/**, /api/inventory/**

        - id: order-service
          uri: http://${ORDER_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: http://${PAYMENT_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/payments/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:3000"
              - "http://localhost:8080"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    shutdown:
      enabled: false
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: OMS API Gateway — JWT validation, CORS, TokenRelay
    version: 1.0.0

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.oms.gateway: DEBUG
