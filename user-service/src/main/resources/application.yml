server:
  port: 8085

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/oms_users
    username: ${DB_USER:oms_user}
    password: ${DB_PASS:oms_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/oms-realm
          jwk-set-uri: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/oms-realm/protocol/openid-connect/certs

keycloak:
  admin:
    server-url: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}
    realm: oms-realm
    client-id: oms-client-admin
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:admin-secret}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    shutdown:
      enabled: false
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: OMS User Service — registration, profiles, addresses, payment methods
    version: 1.0.0

logging:
  level:
    com.oms.user: INFO
    org.flywaydb: INFO
