version: '3.9'

networks:
  oms-network:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:

services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg17
    container_name: oms-postgres
    networks: [oms-network]
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: oms_user
      POSTGRES_PASSWORD: oms_pass
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oms_user -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5


  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: oms-zookeeper
    networks: [oms-network]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2

    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      # 9092 — internal listener (container-to-container, via service name "kafka")
      # 9094 — external listener (host tools such as kcat, Kafdrop)
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Two listeners: INTERNAL for container traffic, EXTERNAL for host tools,
      # CONTROLLER for KRaft metadata.
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    networks:
      - oms-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
      JVM_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - oms-network
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: oms-keycloak
    networks: [oms-network]
    ports: ["8180:8080"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: oms_user
      KC_DB_PASSWORD: oms_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./infra/keycloak/oms-realm.json:/opt/keycloak/data/import/oms-realm.json
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─── Backend Services ─────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: oms-api-gateway
    networks: [oms-network]
    ports: ["8080:8080"]
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      PRODUCT_SERVICE_HOST: product-service
      ORDER_SERVICE_HOST: order-service
      PAYMENT_SERVICE_HOST: payment-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: on-failure

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: oms-product-service
    networks: [oms-network]
    ports: ["8084:8084"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: oms_user
      DB_PASS: oms_pass
      KAFKA_BOOTSTRAP: kafka:9092
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: on-failure

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: oms-order-service
    networks: [oms-network]
    ports: ["8081:8081"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: oms_user
      DB_PASS: oms_pass
      KAFKA_BOOTSTRAP: kafka:9092
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: on-failure

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: oms-payment-service
    networks: [oms-network]
    ports: ["8082:8082"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: oms_user
      DB_PASS: oms_pass
      KAFKA_BOOTSTRAP: kafka:9092
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: on-failure

  # ─── Frontend ─────────────────────────────────────────────────────────────────

  react-ui:
    build:
      context: ./react-ui
      dockerfile: Dockerfile
    container_name: oms-react-ui
    networks: [oms-network]
    ports: ["3000:80"]
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: on-failure
